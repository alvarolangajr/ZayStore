<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZayStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h1>ZayStore</h1>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="add-product.html">Add Product</a>
      <a href="orders.html">Orders</a>
    </div>
  </nav>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h2>Becoming the Best was never easier.</h2>
    <p>
      Discover elite football shoes from Nike, Adidas, and Puma.
      Ready to take you to the next level.
    </p>
    <a class="btn" href="products.html">Shop Now</a>
  </div>
</section>

  <section class="section">
    <h2>Featured Collection</h2>
    <div id="featuredProducts" class="grid"></div>
  </section>

  <script>
    async function loadFeatured() {
      const res = await fetch("/api/products");
      const products = await res.json();

      const container = document.getElementById("featuredProducts");
      container.innerHTML = "";

      products.slice(0, 3).forEach(product => {
        container.innerHTML += `
          <div class="card">
            <img src="${product.image}" alt="${product.name}">
            <div class="card-content">
              <h3>${product.name}</h3>
              <p>${product.description}</p>
              <p class="price">€${product.price}</p>
              <a class="btn" href="product.html?id=${product._id}">View More</a>
            </div>
          </div>
        `;
      });
    }

    loadFeatured();
  </script>
</body>
</html>
