<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h1>ZayStore</h1>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="add-product.html">Add Product</a>
      <a href="orders.html">Orders</a>
    </div>
  </nav>

  <section class="section">
    <h2>Football Shoes / Cleats</h2>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search products">
      <button onclick="loadProducts()">Search</button>
    </div>

    <div id="productList" class="grid"></div>
  </section>

  <script>
    async function loadProducts() {
      const search = document.getElementById("search").value;
      const res = await fetch(`/api/products?search=${encodeURIComponent(search)}`);
      const products = await res.json();

      const container = document.getElementById("productList");
      container.innerHTML = "";

      products.forEach(product => {
        container.innerHTML += `
          <div class="card">
            <img src="${product.image}" alt="${product.name}">
            <div class="card-content">
              <h3>${product.name}</h3>
              <p>${product.description}</p>
              <p class="price">€${product.price}</p>

              <div class="button-group">
                <a class="btn" href="product.html?id=${product._id}">View More</a>
                <a class="btn" href="product.html?id=${product._id}">Buy Now</a>
                <button class="btn delete-btn" onclick="deleteProduct('${product._id}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    async function deleteProduct(id) {
      const confirmed = confirm("Are you sure you want to delete this product?");
      if (!confirmed) return;

      const res = await fetch(`/api/products/${id}`, {
        method: "DELETE"
      });

      if (res.ok) {
        alert("Product deleted");
        loadProducts();
      } else {
        alert("Failed to delete product");
      }
    }

    loadProducts();
  </script>
</body>
</html>
